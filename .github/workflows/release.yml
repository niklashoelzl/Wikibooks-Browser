name: Build Installers

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download JavaFX jmods
        run: |
          curl -L https://download2.gluonhq.com/openjfx/21.0.6/openjfx-21.0.6_windows-x64_bin-jmods.zip -o javafx-jmods.zip
          Expand-Archive javafx-jmods.zip -DestinationPath javafx-jmods
      - run: mvn package -DskipTests
      - name: Build custom runtime with jlink
        run: |
          jlink `
            --module-path "javafx-jmods/javafx-jmods-21.0.6" `
            --add-modules javafx.controls,javafx.fxml,javafx.web,javafx.media,java.base,java.desktop,java.logging,java.xml,java.naming,java.net.http,jdk.crypto.ec,jdk.crypto.cryptoki,java.security.jgss,jdk.localedata `
            --output custom-runtime `
            --strip-debug `
            --no-header-files `
            --no-man-pages
      - name: Build app image with jpackage
        run: |
          jpackage --input target/ `
            --main-jar wikibooks-browser-1.0-SNAPSHOT.jar `
            --main-class application.wikibooks_browser.Launcher `
            --name "Wikibooks Browser" `
            --runtime-image custom-runtime `
            --type app-image `
            --dest app-image
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Create Inno Setup script
        run: |
          @"
          [Setup]
          AppName=Wikibooks Browser
          AppVersion=1.0
          AppPublisher=niklashoelzl
          AppPublisherURL=https://github.com/niklashoelzl/Wikibooks-Browser
          DefaultDirName={autopf}\Wikibooks Browser
          DefaultGroupName=Wikibooks Browser
          OutputBaseFilename=Wikibooks.Browser-1.0
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern
          PrivilegesRequired=lowest

          [Tasks]
          Name: "desktopicon"; Description: "Desktop Symbol hinzufügen"; GroupDescription: "Zusätzliche Optionen:"; Flags: checked
          Name: "launchapp"; Description: "Wikibooks Browser direkt starten"; GroupDescription: "Zusätzliche Optionen:"; Flags: checked

          [Files]
          Source: "app-image\Wikibooks Browser\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

          [Icons]
          Name: "{group}\Wikibooks Browser"; Filename: "{app}\Wikibooks Browser.exe"
          Name: "{autodesktop}\Wikibooks Browser"; Filename: "{app}\Wikibooks Browser.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\Wikibooks Browser.exe"; Tasks: launchapp; Flags: nowait postinstall skipifsilent; Description: "Wikibooks Browser starten"
          "@ | Out-File -FilePath installer.iss -Encoding UTF8
      - name: Build installer with Inno Setup
        run: iscc installer.iss
      - name: Move installer
        run: Move-Item Output\Wikibooks.Browser-1.0.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "Wikibooks.Browser-1.0.exe"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download JavaFX jmods
        run: |
          curl -L https://download2.gluonhq.com/openjfx/21.0.6/openjfx-21.0.6_osx-x64_bin-jmods.zip -o javafx-jmods.zip
          unzip javafx-jmods.zip -d javafx-jmods
      - run: mvn package -DskipTests
      - name: Build custom runtime with jlink
        run: |
          jlink \
            --module-path "javafx-jmods/javafx-jmods-21.0.6" \
            --add-modules javafx.controls,javafx.fxml,javafx.web,javafx.media,java.base,java.desktop,java.logging,java.xml,java.naming,java.net.http,jdk.crypto.ec,jdk.crypto.cryptoki,java.security.jgss,jdk.localedata \
            --output custom-runtime \
            --strip-debug \
            --no-header-files \
            --no-man-pages
      - name: Build installer with jpackage
        run: |
          jpackage --input target/ \
            --main-jar wikibooks-browser-1.0-SNAPSHOT.jar \
            --main-class application.wikibooks_browser.Launcher \
            --name "Wikibooks Browser" \
            --runtime-image custom-runtime \
            --type dmg \
            --about-url "https://github.com/niklashoelzl/Wikibooks-Browser"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: "*.dmg"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download JavaFX jmods
        run: |
          curl -L https://download2.gluonhq.com/openjfx/21.0.6/openjfx-21.0.6_linux-x64_bin-jmods.zip -o javafx-jmods.zip
          unzip javafx-jmods.zip -d javafx-jmods
      - run: mvn package -DskipTests
      - name: Build custom runtime with jlink
        run: |
          jlink \
            --module-path "javafx-jmods/javafx-jmods-21.0.6" \
            --add-modules javafx.controls,javafx.fxml,javafx.web,javafx.media,java.base,java.desktop,java.logging,java.xml,java.naming,java.net.http,jdk.crypto.ec,jdk.crypto.cryptoki,java.security.jgss,jdk.localedata \
            --output custom-runtime \
            --strip-debug \
            --no-header-files \
            --no-man-pages
      - name: Build installer with jpackage
        run: |
          jpackage --input target/ \
            --main-jar wikibooks-browser-1.0-SNAPSHOT.jar \
            --main-class application.wikibooks_browser.Launcher \
            --name "Wikibooks Browser" \
            --runtime-image custom-runtime \
            --type deb \
            --linux-shortcut \
            --about-url "https://github.com/niklashoelzl/Wikibooks-Browser"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: "*.deb"

  release:
    needs: [ build-windows, build-macos, build-linux ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-installer/*.exe
            macos-installer/*.dmg
            linux-installer/*.deb
            
