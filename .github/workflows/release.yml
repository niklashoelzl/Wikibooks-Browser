name: Build Installers

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download JavaFX SDK
        run: |
          curl -L https://download2.gluonhq.com/openjfx/21.0.6/openjfx-21.0.6_windows-x64_bin-sdk.zip -o javafx.zip
          Expand-Archive javafx.zip -DestinationPath javafx-sdk
      - run: mvn package -DskipTests
      - run: |
          jpackage --input target/ `
            --main-jar wikibooks-browser-1.0-SNAPSHOT.jar `
            --name "Wikibooks Browser" `
            --type exe `
            --win-shortcut `
            --win-menu `
            --module-path javafx-sdk/javafx-sdk-21.0.6/lib `
            --add-modules javafx.controls,javafx.fxml,javafx.web
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "*.exe"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download JavaFX SDK
        run: |
          curl -L https://download2.gluonhq.com/openjfx/21.0.6/openjfx-21.0.6_osx-x64_bin-sdk.zip -o javafx.zip
          unzip javafx.zip -d javafx-sdk
      - run: mvn package -DskipTests
      - run: |
          jpackage --input target/ \
            --main-jar wikibooks-browser-1.0-SNAPSHOT.jar \
            --name "Wikibooks Browser" \
            --type dmg \
            --module-path javafx-sdk/javafx-sdk-21.0.6/lib \
            --add-modules javafx.controls,javafx.fxml,javafx.web
      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: "*.dmg"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download JavaFX SDK
        run: |
          curl -L https://download2.gluonhq.com/openjfx/21.0.6/openjfx-21.0.6_linux-x64_bin-sdk.zip -o javafx.zip
          unzip javafx.zip -d javafx-sdk
      - run: mvn package -DskipTests
      - run: |
          jpackage --input target/ \
            --main-jar wikibooks-browser-1.0-SNAPSHOT.jar \
            --name "Wikibooks Browser" \
            --type deb \
            --module-path javafx-sdk/javafx-sdk-21.0.6/lib \
            --add-modules javafx.controls,javafx.fxml,javafx.web
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: "*.deb"

  release:
    needs: [ build-windows, build-macos, build-linux ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-installer/*.exe
            macos-installer/*.dmg
            linux-installer/*.deb